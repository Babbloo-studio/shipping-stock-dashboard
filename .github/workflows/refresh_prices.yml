name: Intraday Price Refresh

on:
  schedule:
    - cron: '*/30 9-21 * * 1-5'  # Every 30 min, 9am-9pm UTC weekdays
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch current prices
        run: |
          uv run python -c "
          from src.ingestion.prices import fetch_current_prices
          import os, json
          from datetime import datetime
          prices = fetch_current_prices()
          os.makedirs('data/prices', exist_ok=True)
          ts = datetime.utcnow().strftime('%Y-%m-%dT%H%M')
          prices.to_parquet(f'data/prices/{ts}.parquet', index=False)
          print(prices[['ticker','price','change_pct']].to_string(index=False))
          "

      - name: Commit price snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/
          git diff --staged --quiet || git commit -m "data: price snapshot $(date -u +%Y-%m-%dT%H:%M)"
          git push
